<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aurora — Personal Life OS</title>
    <meta name="description" content="Your intelligent productivity operating system — tasks, goals, habits, focus, and AI in one place." />

    <!-- Theme color — updated dynamically by ThemeContext -->
    <meta id="theme-color-meta" name="theme-color" content="#c3a1f7" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Fonts — display + body + mono -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap"
      rel="stylesheet"
    />

    <!--
      Anti-flash script — runs synchronously before first paint.
      Applies .dark to <html> immediately so React never renders
      in the wrong theme. Must stay inline, must stay in <head>.
    -->
    <script>
      (function () {
        try {
          var KEY      = 'aurora_theme';
          var stored   = localStorage.getItem(KEY) || 'system';
          var sysDark  = window.matchMedia('(prefers-color-scheme: dark)').matches;
          var isDark   = stored === 'dark' || (stored === 'system' && sysDark);
          if (isDark) {
            document.documentElement.classList.add('dark');
            var meta = document.getElementById('theme-color-meta');
            if (meta) meta.setAttribute('content', '#0c0a1a');
          }
        } catch (e) {
          // localStorage blocked (private mode) — silently fall back to light
        }
      })();
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
